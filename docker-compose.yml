services:
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-gmailfilter}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-gmailfilter}
      - POSTGRES_DB=${POSTGRES_DB:-gmailfilter}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gmailfilter}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    image: ghcr.io/eidan121/gmailfilter-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - gmail_data:/root/.gmail_filter_app
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - TOKEN_ENCRYPTION_KEY=${TOKEN_ENCRYPTION_KEY:-}
      - FRONTEND_ORIGIN=http://localhost:5173
      - DATABASE_URL=postgresql+psycopg://${POSTGRES_USER:-gmailfilter}:${POSTGRES_PASSWORD:-gmailfilter}@db:5432/${POSTGRES_DB:-gmailfilter}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  scanner:
    image: ghcr.io/eidan121/gmailfilter-backend:latest
    command: ["uv", "run", "python", "-m", "app.scanner.daemon"]
    volumes:
      - gmail_data:/root/.gmail_filter_app
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - TOKEN_ENCRYPTION_KEY=${TOKEN_ENCRYPTION_KEY:-}
      - DATABASE_URL=postgresql+psycopg://${POSTGRES_USER:-gmailfilter}:${POSTGRES_PASSWORD:-gmailfilter}@db:5432/${POSTGRES_DB:-gmailfilter}
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    restart: unless-stopped

  frontend:
    image: ghcr.io/eidan121/gmailfilter-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  gmail_data:
  postgres_data:
