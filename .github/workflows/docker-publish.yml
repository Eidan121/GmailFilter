name: Build and publish images

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build images defined in docker-compose.yml
        run: docker compose build

      - name: Push images to GHCR
        run: docker compose push

  deploy:
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Compute Engine VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_VM_HOST }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_VM_SSH_KEY }}
          script: |
            if [ ! -d ~/GmailFilter/.git ]; then
              git clone https://github.com/Eidan121/GmailFilter.git ~/GmailFilter
            fi
            cd ~/GmailFilter
            git pull
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
            docker compose pull
            docker compose up -d
            docker image prune -f

      - name: Verify deployed ports are reachable
        run: |
          for port in 80 8000; do
            if nc -z -w5 "${{ secrets.GCP_VM_HOST }}" "$port"; then
              echo "✅ Port $port is open on ${{ secrets.GCP_VM_HOST }}"
            else
              echo "❌ Port $port is NOT reachable on ${{ secrets.GCP_VM_HOST }}"
              exit 1
            fi
          done

      - name: Print deployed service links
        run: |
          echo "## 🚀 Deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Frontend: http://${{ secrets.GCP_VM_HOST }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Backend API: http://${{ secrets.GCP_VM_HOST }}:8000/docs" >> "$GITHUB_STEP_SUMMARY"
            docker image prune -f
