name: Build and publish images

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build images defined in docker-compose.yml
        run: docker compose build

      - name: Push images to GHCR
        run: docker compose push

  deploy:
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      CLOUDSDK_CORE_DISABLE_PROMPTS: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Check required secrets are set (no values printed)
        run: |
          for name in GCP_SA_KEY GCP_PROJECT_ID GCP_VM_NAME GCP_VM_ZONE GCP_VM_USER GCP_VM_HOST GCP_SSH_PRIVATE_KEY GHCR_TOKEN ANTHROPIC_API_KEY GOOGLE_CLIENT_ID GOOGLE_CLIENT_SECRET TOKEN_ENCRYPTION_KEY; do
            value="${!name}"
            if [ -n "$value" ]; then
              echo "$name: SET (length ${#value})"
            else
              echo "$name: MISSING"
            fi
          done
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_VM_NAME: ${{ secrets.GCP_VM_NAME }}
          GCP_VM_ZONE: ${{ secrets.GCP_VM_ZONE }}
          GCP_VM_USER: ${{ secrets.GCP_VM_USER }}
          GCP_VM_HOST: ${{ secrets.GCP_VM_HOST }}
          GCP_SSH_PRIVATE_KEY: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          TOKEN_ENCRYPTION_KEY: ${{ secrets.TOKEN_ENCRYPTION_KEY }}

      - name: Copy docker-compose.yml to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.GCP_VM_HOST }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          source: "docker-compose.yml"
          target: "~/gmailfilter/"

      - name: Deploy & inject secrets from GitHub Actions secrets
        uses: appleboy/ssh-action@v1.0.3
        env:
          ENV_B64: ${{ toJSON(format('ANTHROPIC_API_KEY={0}\nGOOGLE_CLIENT_ID={1}\nGOOGLE_CLIENT_SECRET={2}\nTOKEN_ENCRYPTION_KEY={3}\n', secrets.ANTHROPIC_API_KEY, secrets.GOOGLE_CLIENT_ID, secrets.GOOGLE_CLIENT_SECRET, secrets.TOKEN_ENCRYPTION_KEY)) }}
        with:
          host: ${{ secrets.GCP_VM_HOST }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          envs: ENV_B64,GHCR_TOKEN,REGISTRY,GITHUB_ACTOR
          envs_GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          envs_REGISTRY: ${{ env.REGISTRY }}
          envs_GITHUB_ACTOR: ${{ github.actor }}
          script: |
            set -e
            mkdir -p ~/gmailfilter && cd ~/gmailfilter
            ENV_CONTENT=$(printf '%s' "$ENV_B64" | sed -e 's/^"//' -e 's/"$//')
            printf '%b' "$ENV_CONTENT" > .env
            chmod 600 .env
            echo "$GHCR_TOKEN" | docker login "$REGISTRY" -u "$GITHUB_ACTOR" --password-stdin
            docker compose pull
            docker compose up -d
            docker image prune -f

      - name: Verify deployed ports are reachable
        run: |
          for port in 80; do
            if nc -z -w5 "${{ secrets.GCP_VM_HOST }}" "$port"; then
              echo "✅ Port $port is open on ${{ secrets.GCP_VM_HOST }}"
            else
              echo "❌ Port $port is NOT reachable on ${{ secrets.GCP_VM_HOST }}"
              exit 1
            fi
          done

      - name: Print deployed service links
        run: |
          echo "## 🚀 Deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Frontend: http://${{ secrets.GCP_VM_HOST }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Backend API: http://${{ secrets.GCP_VM_HOST }}:8000/docs" >> "$GITHUB_STEP_SUMMARY"
