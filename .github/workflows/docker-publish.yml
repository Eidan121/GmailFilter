name: Build and publish images

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build images defined in docker-compose.yml
        run: docker compose build

      - name: Push images to GHCR
        run: docker compose push

  deploy:
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      CLOUDSDK_CORE_DISABLE_PROMPTS: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Copy docker-compose.yml to VM
        run: |
          gcloud compute scp docker-compose.yml \
            "${{ secrets.GCP_VM_USER }}@${{ secrets.GCP_VM_NAME }}:~/gmailfilter/docker-compose.yml" \
            --zone "${{ secrets.GCP_VM_ZONE }}" \
            --tunnel-through-iap

      - name: Deploy & inject secrets from GitHub Actions secrets
        env:
          ENV_B64: ${{ toJSON(format('ANTHROPIC_API_KEY={0}\nGOOGLE_CLIENT_ID={1}\nGOOGLE_CLIENT_SECRET={2}\nTOKEN_ENCRYPTION_KEY={3}\n', secrets.ANTHROPIC_API_KEY, secrets.GOOGLE_CLIENT_ID, secrets.GOOGLE_CLIENT_SECRET, secrets.TOKEN_ENCRYPTION_KEY)) }}
        run: |
          # Build .env content from GitHub secrets and ship it base64-encoded
          # so it never appears in plaintext in logs or shell history.
          ENV_CONTENT_B64=$(printf '%s' "$ENV_B64" | sed -e 's/^"//' -e 's/"$//' | base64 -w0)

          gcloud compute ssh "${{ secrets.GCP_VM_USER }}@${{ secrets.GCP_VM_NAME }}" \
            --zone "${{ secrets.GCP_VM_ZONE }}" \
            --tunnel-through-iap \
            --command="
              set -e
              mkdir -p ~/gmailfilter && cd ~/gmailfilter
              echo '${ENV_CONTENT_B64}' | base64 -d > .env
              chmod 600 .env
              echo '${{ secrets.GHCR_TOKEN }}' | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
              docker compose pull
              docker compose up -d
              docker image prune -f
            "

      - name: Verify deployed ports are reachable
        run: |
          for port in 80; do
            if nc -z -w5 "${{ secrets.GCP_VM_HOST }}" "$port"; then
              echo "✅ Port $port is open on ${{ secrets.GCP_VM_HOST }}"
            else
              echo "❌ Port $port is NOT reachable on ${{ secrets.GCP_VM_HOST }}"
              exit 1
            fi
          done

      - name: Print deployed service links
        run: |
          echo "## 🚀 Deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Frontend: http://${{ secrets.GCP_VM_HOST }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Backend API: http://${{ secrets.GCP_VM_HOST }}:8000/docs" >> "$GITHUB_STEP_SUMMARY"
